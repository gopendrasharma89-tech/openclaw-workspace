name: Daily Self-Reflection & Maintenance

on:
  schedule:
    - cron: "0 7 * * *"   # daily 07:00 UTC
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    if: github.repository == 'gopendrasharma89-tech/openclaw-workspace'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest check-jsonschema pyyaml

      - name: Run Self-Reflection scan
        run: python -m skills.self_reflection.cli scan

      - name: Validate schemas
        run: |
          check-jsonschema --schemafile schemas/health.json <(echo '{"data":{"status":"ok","uptimeSeconds":0,"timestamp":"2026-04-16T06:00:00Z"},"meta":{"requestId":"daily","timestamp":"2026-04-16T06:00:00Z","version":"v0"}}')
          check-jsonschema --schemafile schemas/error.json <(echo '{"error":{"code":"ERR_INVALID_REQUEST","message":"test"},"meta":{"requestId":"daily","timestamp":"2026-04-16T06:00:00Z","version":"v0"}}')

      - name: Validate OpenAPI structure
        run: |
          python3 -c "
          import yaml, os
          doc = yaml.safe_load(open('openapi.yaml'))
          assert 'openapi' in doc and 'info' in doc and 'paths' in doc
          print('OpenAPI OK')
          "

      - name: Clean code
        run: python -m skills.self_reflection.cli clean --target all --dry-run

      - name: Commit habit state if changed
        run: |
          git config user.email "kavi@openclaw.local"
          git config user.name "Kavi"
          git add habits/tracker.json 2>/dev/null || true
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "daily: update habit tracker" -m "autonomous daily update"
            git push origin main
          else
            echo "No habit changes to commit."
          fi

      - name: Weekly summary (Sunday 07:00 UTC)
        if: github.event.schedule == '0 7 * * 0'
        run: |
          python reports/weekly_summary.py
          mkdir -p artifacts
          cp reports/weekly_summary_*.md artifacts/

      - name: Upload weekly summary artifact
        if: github.event.schedule == '0 7 * * 0'
        uses: actions/upload-artifact@v4
        with:
          name: weekly-summary
          path: artifacts/
          retention-days: 30

      - name: Report summary
        run: |
          echo "--- Daily scan summary ---"
          python -m skills.self_reflection.cli report 2>&1 || true