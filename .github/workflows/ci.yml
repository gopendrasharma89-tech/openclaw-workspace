# Basic CI workflow for openclaw-workspace
name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  health-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify branch and python
        run: |
          echo "--- Branch ---"
          git branch -a
          echo "--- Python ---"
          python --version
          python -c "import sys; print('Python executable:', sys.executable)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest check-jsonschema
          # No project-level requirements yet

      - name: Debug workspace
        run: |
          echo "--- Git status ---"
          git status --short
          echo "--- Files in workspace root ---"
          ls -la
          echo "--- Skills directory ---"
          ls -la skills/ 2>/dev/null || echo "skills/ not found or empty"

      - name: Health check
        run: |
          bash scripts/healthcheck.sh

      - name: Validate JSON schemas
        run: |
          check-jsonschema --schemafile schemas/health.json <(echo '{"data":{"status":"ok","uptimeSeconds":0,"timestamp":"2026-04-16T06:00:00Z"},"meta":{"requestId":"test","timestamp":"2026-04-16T06:00:00Z","version":"v0"}}')
          check-jsonschema --schemafile schemas/error.json <(echo '{"error":{"code":"ERR_INVALID_REQUEST","message":"test"},"meta":{"requestId":"test","timestamp":"2026-04-16T06:00:00Z","version":"v0"}}')

      - name: Run basic integration tests (verbose)
        run: |
          python -m pytest tests/integration/test_basic.py -v

      - name: Report workspace state
        run: |
          echo "Git status:"
          git status --short
          echo "Latest commit:"
          git log --oneline -1