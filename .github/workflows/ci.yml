# Basic CI workflow for openclaw-workspace
name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  health-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies (if any)
        run: |
          python -m pip install --upgrade pip
          # No project-level requirements yet; install optional deps here if needed
      - name: Health check
        run: |
          bash /root/.openclaw/workspace/scripts/healthcheck.sh
      - name: Run basic integration tests
        run: |
          python3 /root/.openclaw/workspace/tests/integration/test_basic.py
      - name: Report workspace state
        run: |
          echo "Git status:"
          git status --short
          echo "Latest commit:"
          git log --oneline -1